# Standalone stack for Coolify (or `docker compose up`).
# Coolify auto-creates the network and injects env vars from its UI; the
# defaults below let it also run locally.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artefacts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artefacts}
      POSTGRES_DB: ${POSTGRES_DB:-artefacts}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artefacts}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies the Drizzle schema, then exits. `web` waits for it.
  migrate:
    build:
      context: ./web
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-artefacts}:${POSTGRES_PASSWORD:-artefacts}@db:5432/${POSTGRES_DB:-artefacts}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ./web
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-artefacts}:${POSTGRES_PASSWORD:-artefacts}@db:5432/${POSTGRES_DB:-artefacts}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      # Public builder URL (Auth.js) and the wildcard sub-zone for generated-app
      # previews. APPS_DOMAIN MUST match the host the previews are actually served
      # on (e.g. apps.kubikraum.digital) — the /serve route 404s ("Not found") if
      # the request host doesn't end with .<APPS_DOMAIN>. Explicitly wired here so
      # a Coolify env change can't silently fail to reach the container.
      AUTH_URL: ${AUTH_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      APPS_DOMAIN: ${APPS_DOMAIN}
      # Outgoing mail (welcome + password-reset). Referenced here so Coolify UI
      # values actually reach the container. Template overrides are optional —
      # when unset they fall back to the defaults in lib/mail-templates.ts.
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_RESET_TTL_HOURS: ${MAIL_RESET_TTL_HOURS}
      MAIL_WELCOME_SUBJECT: ${MAIL_WELCOME_SUBJECT}
      MAIL_WELCOME_HTML: ${MAIL_WELCOME_HTML}
      MAIL_RESET_SUBJECT: ${MAIL_RESET_SUBJECT}
      MAIL_RESET_HTML: ${MAIL_RESET_HTML}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  # Marketing landing page (kubikraum.digital) — a separate, anonymous, stateless
  # Next app. In Coolify it's deployed as its own resource on its own domain; this
  # service block is mainly for local `docker compose up`. NEXT_PUBLIC_BUILDER_URL
  # is a BUILD-time value (baked into the client bundle), passed as a build arg.
  landing:
    build:
      context: ./landing
      target: runner
      args:
        NEXT_PUBLIC_BUILDER_URL: ${NEXT_PUBLIC_BUILDER_URL:-https://app.kubikraum.digital}
    restart: unless-stopped
    ports:
      - "3001:3000"

volumes:
  db-data:
