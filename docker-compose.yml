# Standalone stack for Coolify (or `docker compose up`).
# Coolify auto-creates the network and injects env vars from its UI; the
# defaults below let it also run locally.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-artefacts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artefacts}
      POSTGRES_DB: ${POSTGRES_DB:-artefacts}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artefacts}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies the Drizzle schema, then exits. `web` waits for it.
  migrate:
    build:
      context: ./web
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-artefacts}:${POSTGRES_PASSWORD:-artefacts}@db:5432/${POSTGRES_DB:-artefacts}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ./web
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-artefacts}:${POSTGRES_PASSWORD:-artefacts}@db:5432/${POSTGRES_DB:-artefacts}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      # Public builder URL (Auth.js) and the wildcard sub-zone for generated-app
      # previews. APPS_DOMAIN MUST match the host the previews are actually served
      # on (e.g. apps.kubikraum.digital) — the /serve route 404s ("Not found") if
      # the request host doesn't end with .<APPS_DOMAIN>. Explicitly wired here so
      # a Coolify env change can't silently fail to reach the container.
      AUTH_URL: ${AUTH_URL}
      APPS_DOMAIN: ${APPS_DOMAIN}
      # cortecs.ai LLM router. Every var the container needs must be listed here
      # or Coolify won't inject the UI value (see CLAUDE.md). The Anthropic
      # BASE_URL/AUTH_TOKEN are NOT global — lib/agent/run.ts injects them per
      # SDK call so they can't affect anything else.
      CORTECS_API_KEY: ${CORTECS_API_KEY}
      CORTECS_ANTHROPIC_BASE_URL: ${CORTECS_ANTHROPIC_BASE_URL}
      CORTECS_OPENAI_BASE_URL: ${CORTECS_OPENAI_BASE_URL}
      CORTECS_BUILD_MODEL: ${CORTECS_BUILD_MODEL}
      CORTECS_CLEANUP_MODEL: ${CORTECS_CLEANUP_MODEL}
      CORTECS_INTERVIEW_MODEL: ${CORTECS_INTERVIEW_MODEL}
      CORTECS_SOVEREIGN_BUILD_MODEL: ${CORTECS_SOVEREIGN_BUILD_MODEL}
      BILLING_MARGIN: ${BILLING_MARGIN}
      FREE_TIER_GRANT_EUR: ${FREE_TIER_GRANT_EUR}
      CORTECS_PRICE_TTL_MS: ${CORTECS_PRICE_TTL_MS}
      CORTECS_FEE_MULTIPLIER: ${CORTECS_FEE_MULTIPLIER}
      # Referral coupons (also editable in the admin /settings; empty → code
      # default 10 / 5 / 14 via settingNumber).
      REFERRAL_RECIPIENT_EUR: ${REFERRAL_RECIPIENT_EUR}
      REFERRAL_REFERRER_EUR: ${REFERRAL_REFERRER_EUR}
      REFERRAL_WINDOW_DAYS: ${REFERRAL_WINDOW_DAYS}
      # Pexels stock-photo search for the builder agent (free key from
      # https://www.pexels.com/api/). Optional: without it the photo tools are
      # disabled and the agent falls back to SVG/CSS imagery.
      PEXELS_API_KEY: ${PEXELS_API_KEY}
      # Daily full-app backups of published projects. BACKUP_CRON_SECRET is the
      # bearer secret for the internal POST /api/cron/backup route (env-only,
      # like AUTH_SECRET; unset → the endpoint is closed). ENABLED/RETENTION_DAYS
      # are also editable in admin /settings (empty → code defaults: on / 7 days).
      BACKUP_CRON_SECRET: ${BACKUP_CRON_SECRET}
      BACKUP_ENABLED: ${BACKUP_ENABLED}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS}
      # OpenGraph thumbnails: web POSTs a project's inlined HTML to the internal
      # `shot` service, which returns a 1200x630 screenshot of the page header.
      # SCREENSHOT_SERVICE_URL unset → feature off; SECRET must match `shot`
      # (env-only, closed by default). THUMBNAIL_ENABLED is a kill-switch also
      # editable in admin /settings (blank → on).
      SCREENSHOT_SERVICE_URL: ${SCREENSHOT_SERVICE_URL:-http://shot:3000}
      SCREENSHOT_SERVICE_SECRET: ${SCREENSHOT_SERVICE_SECRET}
      THUMBNAIL_ENABLED: ${THUMBNAIL_ENABLED}
      # Shared bearer for the internal admin→web API (POST /api/admin/projects),
      # which lets the admin panel publish / take a user's app offline (that needs
      # the builder's backup + thumbnail logic). Env-only, like BACKUP_CRON_SECRET;
      # must match the admin service below. Unset → the endpoint is closed (403).
      ADMIN_API_SECRET: ${ADMIN_API_SECRET}
      # External MCP editing bridge (POST /api/mcp): a support operator points their
      # OWN AI (e.g. Claude Code) at one user's app via MCP to help build it, without
      # spending the user's credit or touching their chat. Env-only, like the secrets
      # above; unset → the endpoint is closed (401). See .env.example for the connect
      # command.
      DEV_API_SECRET: ${DEV_API_SECRET}
      # Stripe billing (Payment Links). SECRET_KEY + WEBHOOK_SECRET are secrets
      # (env-only, like CORTECS_API_KEY; unset → the webhook route rejects). The
      # Payment Link URLs + monthly credit are also editable in admin /settings
      # (blank → the link/button is hidden / 5€ default via settingNumber).
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_SUBSCRIPTION_LINK: ${STRIPE_SUBSCRIPTION_LINK}
      STRIPE_TOPUP_LINK_5: ${STRIPE_TOPUP_LINK_5}
      STRIPE_TOPUP_LINK_10: ${STRIPE_TOPUP_LINK_10}
      STRIPE_TOPUP_LINK_20: ${STRIPE_TOPUP_LINK_20}
      SUBSCRIPTION_MONTHLY_CREDIT_EUR: ${SUBSCRIPTION_MONTHLY_CREDIT_EUR}
      # Outgoing mail (welcome + password-reset). Referenced here so Coolify UI
      # values actually reach the container. The email subject/HTML are NO LONGER
      # env vars — they live in the `mail_template` DB table and are edited in the
      # admin app (Coolify caps env values at 256 chars, too short for the HTML).
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_RESET_TTL_HOURS: ${MAIL_RESET_TTL_HOURS}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  # Marketing landing page (kubikraum.digital) — a separate, anonymous, stateless
  # Next app. In Coolify it's deployed as its own resource on its own domain; this
  # service block is mainly for local `docker compose up`. NEXT_PUBLIC_BUILDER_URL
  # is a BUILD-time value (baked into the client bundle), passed as a build arg.
  landing:
    build:
      context: ./landing
      target: runner
      args:
        NEXT_PUBLIC_BUILDER_URL: ${NEXT_PUBLIC_BUILDER_URL:-https://app.kubikraum.digital}
    restart: unless-stopped
    ports:
      - "3001:3000"

  # Read-only admin panel — a separate Next app that reads the builder's Postgres
  # to list users + apps with their costs. In Coolify it's deployed as its own
  # resource on its own domain (e.g. admin.kubikraum.digital); this block is
  # mainly for local `docker compose up`. Login is ENV-based (ADMIN_USER /
  # ADMIN_PASSWORD), the session cookie is HMAC-signed with ADMIN_SECRET.
  admin:
    build:
      context: ./admin
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-artefacts}:${POSTGRES_PASSWORD:-artefacts}@db:5432/${POSTGRES_DB:-artefacts}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
      # Publish / take-offline a user's app from the admin panel: it calls web's
      # internal /api/admin/projects with this shared bearer (must match web's
      # ADMIN_API_SECRET above). WEB_INTERNAL_URL is web's address on the compose
      # network (default http://web:3000); override only for a non-standard setup.
      ADMIN_API_SECRET: ${ADMIN_API_SECRET}
      WEB_INTERNAL_URL: ${WEB_INTERNAL_URL:-http://web:3000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3000"

  # Internal headless-Chromium screenshot service for OpenGraph thumbnails. `web`
  # POSTs a project's inlined HTML and gets back a 1200x630 PNG of the page header.
  # Like landing/admin it's served FROM this compose stack (never a standalone
  # Coolify resource) — but it has NO public domain: only `web` talks to it over
  # the internal network. Intentionally NOT in web's depends_on: the thumbnail
  # feature is fail-safe, so web must boot even if shot is down/building. The big
  # Playwright image is bounded with mem_limit on the tight VPS.
  shot:
    build:
      context: ./shot
    restart: unless-stopped
    mem_limit: 1g
    environment:
      SCREENSHOT_SERVICE_SECRET: ${SCREENSHOT_SERVICE_SECRET}
      PORT: 3000
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 15s
      timeout: 5s
      retries: 5
    # No published ports in prod (internal only). Uncomment for local testing:
    # ports:
    #   - "3003:3000"

volumes:
  db-data:
